services:
  db:
    image: postgres:17-bookworm
    container_name: library_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library_network

  backend:
    build: .
    container_name: libraryAPI
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: "db"
      DB_PORT: "5432"
    networks:
      - library_network

volumes:
  postgres_data:
networks:
  library_network:
    driver: bridge