services:
  db:
    image: postgres:18-bookworm
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library_network

  backend:
    build: .
    container_name: libraryAPI
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: "db"
    networks:
      - library_network

volumes:
  postgres_data:
networks:
  library_network:
    driver: bridge